standards_version: "v3"

markdown:
  frontmatter:
    version: "1.1"
    schema: "markdown-frontmatter"
    required: true
    include:
      - "docs/**/*.md"
      - "docs/research/*.md"
      - "products/**/*.md"
      - "hooks/**/*.md"
    exclude:
      - "docs/scratchpad.md"
      - "docs/handoff/**"
      - "docs/reviews/**"
      - "docs/plans/**"
      - "docs/superpowers/plans/**"
      - "tests/fixtures/**"
      - "README.md"
      - "docs/TODO.md"
      - "docs/STATUS.md"
      - "**/*.template.md"
      - "CHANGELOG.md"
      - "LICENSE.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - ".claude/**"
      - ".agents/**"
      - ".codex/**"
      - ".github/**"
      - "node_modules/**"
  adr:
    version: "1.0"
    require_sections: true

markdown_tooling:
  version: "1.1"

cli_documentation:
  version: "1.0"

spec:
  include:
    - "docs/specs/**/*.md"
  exclude: []

# BEGIN agent-handoff managed config
agent_handoff:
  version: "1.0"
  startup: automatic
  harnesses:
    - claude-code
    - codex
# END agent-handoff managed config
