name: Agent Pseudocode Validation

on:
  pull_request:
    paths:
      - "**/*.apseudo"
      - "**/*.agentpseudo"
      - "**/*.pseudocode"
      - "**/*.md"
      - "**/*.markdown"
      - "src/apseudo_lint/**"
      - "tests/**"
      - "scripts/**"
      - "products/vscode-extension/**"
      - "products/kate-integration/**"
      - "integrations/agent-hooks/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".mcp.json"
      - "pyproject.toml"
      - ".github/workflows/apseudo-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.apseudo"
      - "**/*.agentpseudo"
      - "**/*.pseudocode"
      - "**/*.md"
      - "**/*.markdown"
      - "src/apseudo_lint/**"
      - "tests/**"
      - "scripts/**"
      - "products/vscode-extension/**"
      - "products/kate-integration/**"
      - "integrations/agent-hooks/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".mcp.json"
      - "pyproject.toml"
      - ".github/workflows/apseudo-lint.yml"
  workflow_dispatch:

jobs:
  apseudo-lint:
    name: Validate pseudocode standard
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project and dev tooling
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest

      - name: Check pseudocode formatting
        run: uv run apseudo-format --check .

      - name: Lint pseudocode files and Markdown fences
        run: uv run apseudo-lint .

      - name: Review project completeness
        run: uv run apseudo-review .

      - name: Smoke CLI entry points
        run: |
          uv run apseudo-lsp --version
          uv run apseudo-mcp --version
          uv run apseudo-explain APSEUDO-WHILE-001 >/dev/null
          uv run apseudo-template bounded-review-loop >/dev/null
          uv run apseudo-mermaid docs/examples/review-loop.apseudo --no-fence >/dev/null

      - name: Validate JSON/TOML configs
        run: |
          python -m json.tool .claude/settings.json >/dev/null
          python -m json.tool .codex/hooks.json >/dev/null
          python -m json.tool .mcp.json >/dev/null
          python - <<'PY'
          import tomllib
          from pathlib import Path
          _ = tomllib.loads(Path('.codex/config.toml').read_text())
          PY

      - name: Lint Python implementation
        run: uv run ruff check src tests integrations/agent-hooks

      - name: Run pyright strict type check
        run: uv run pyright
