[project_standards]
schema_version = "1.0"
catalog = "5"

[standards.adr]
enabled = true
version = "latest"
config = { contract_version = "1.0", require_sections = true }

[standards.agent-handoff]
enabled = true
version = "latest"
config = { contract_version = "1.0", harnesses = ["claude-code", "codex"], startup = "automatic" }

[standards.cli-documentation]
enabled = true
version = "latest"
config = { contract_version = "1.0", workflow_ownership = "consumer-owned" }

[standards.markdown-frontmatter]
enabled = true
version = "latest"
config = { contract_version = "1.1", exclude = ["**/*.template.md", "AGENTS.md", "CLAUDE.md", ".agents/**", ".claude/**", ".codex/**", ".github/**", "docs/STATUS.md", "docs/TODO.md", "docs/handoff/**", "node_modules/**", "docs/scratchpad.md", "docs/reviews/**", "docs/plans/**", "docs/superpowers/plans/**", "tests/fixtures/**", "README.md", "CHANGELOG.md", "LICENSE.md"], include = ["docs/**/*.md", "docs/research/*.md", "products/**/*.md", "hooks/**/*.md"], required = true, schema = "markdown-frontmatter" }

[standards.markdown-tooling]
enabled = true
version = "latest"
config = { contract_version = "1.1", format = false, ci = { lint_caller = true, format_caller = false } }

[standards.project-spec]
enabled = true
version = "latest"
config = { include_patterns = ["docs/specs/**/*.md"] }
