[mcp_servers.agent_pseudocode]
command = "bash"
args = [
  "-lc",
  "cd \"$(git rev-parse --show-toplevel)\" && exec ./mcp/apseudo-mcp",
]
startup_timeout_sec = 10
tool_timeout_sec = 60
default_tools_approval_mode = "approve"
enabled = true

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"
[[hooks.SessionStart.hooks]]
type = "command"
command = '"$(git rev-parse --show-toplevel)/.agents/hooks/agent-handoff/session_start.py"'
timeout = 10
statusMessage = "Loading agent handoff state..."
