# Local pre-commit integration for the Agent Pseudocode formatter and validator.
# Install with: pre-commit install
# Run manually with: pre-commit run --all-files
minimum_pre_commit_version: "3.0.0"

repos:
  - repo: local
    hooks:
      - id: apseudo-format
        name: Agent Pseudocode Formatter
        description: Check .apseudo files and apseudo fenced blocks in Markdown.
        entry: scripts/apseudo-format
        language: system
        stages: [pre-commit, pre-push, manual]
        files: '\.(apseudo|agentpseudo|pseudocode|md|markdown)$'
        pass_filenames: true
      - id: apseudo-lint
        name: Agent Pseudocode Validator
        description: Validate .apseudo files and apseudo fenced blocks in Markdown.
        entry: scripts/apseudo-lint
        language: system
        stages: [pre-commit, pre-push, manual]
        files: '\.(apseudo|agentpseudo|pseudocode|md|markdown)$'
        pass_filenames: true
      - id: apseudo-review
        name: Agent Pseudocode Project Review
        description: Review project-level pseudocode/tooling completeness before push.
        entry: scripts/apseudo-review .
        language: system
        stages: [pre-push, manual]
        pass_filenames: false
